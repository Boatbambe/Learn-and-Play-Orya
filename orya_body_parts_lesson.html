<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belajar Bahasa Orya — Bagian Tubuh</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Baloo+2:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --accent: #f97316;
    --accent2: #38bdf8;
    --accent3: #a78bfa;
    --text: #f0f6fc;
    --muted: #8b949e;
    --correct: #22c55e;
    --wrong: #ef4444;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(249,115,22,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(56,189,248,0.10) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app { width: 100%; max-width: 680px; padding: 24px 16px 48px; position: relative; z-index:1; }

  /* ===== NAME SCREEN ===== */
  #name-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .name-card {
    background: var(--card);
    border: 1px solid #21262d;
    border-radius: 28px;
    padding: 48px 36px;
    width: 100%;
    max-width: 420px;
    position: relative;
    overflow: hidden;
  }
  .name-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
  }
  .name-logo { font-size: 64px; display: block; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .name-title {
    font-family: 'Baloo 2', sans-serif;
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }
  .name-sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .name-label { font-size: 13px; font-weight: 700; color: var(--muted); text-align: left; margin-bottom: 8px; letter-spacing: 0.5px; }
  .name-input {
    width: 100%;
    padding: 14px 18px;
    background: #0d1117;
    border: 2px solid #21262d;
    border-radius: 14px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 700;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 20px;
  }
  .name-input:focus { border-color: var(--accent); }
  .name-input::placeholder { color: #3d444d; }
  .name-start-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #ea580c);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 17px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(249,115,22,0.4);
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .name-start-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
  .name-start-btn:active { transform: scale(0.97); }

  /* ===== HEADER ===== */
  .header { text-align: center; margin-bottom: 32px; }
  .header .flag { font-size: 48px; display: block; margin-bottom: 8px; animation: float 3s ease-in-out infinite; }
  .header h1 {
    font-family: 'Baloo 2', sans-serif;
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p { color: var(--muted); font-size: 14px; margin-top: 4px; }

  /* ===== PLAYER BADGE ===== */
  .player-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border: 1px solid #21262d;
    border-radius: 50px;
    padding: 8px 16px 8px 10px;
    margin-bottom: 20px;
    width: fit-content;
  }
  .player-avatar {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 800;
    color: #fff;
    flex-shrink: 0;
  }
  .player-name-text { font-size: 14px; font-weight: 700; }
  .player-best { font-size: 12px; color: var(--muted); }

  /* ===== LEADERBOARD ===== */
  .leaderboard-wrap {
    background: var(--card);
    border: 1px solid #21262d;
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 24px;
    display: none;
  }
  .leaderboard-wrap.show { display: block; }
  .lb-title { font-size: 13px; font-weight: 800; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px; }
  .lb-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid #21262d;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank { font-size: 18px; width: 28px; text-align: center; }
  .lb-player-name { flex: 1; font-weight: 700; font-size: 14px; }
  .lb-score-pill {
    background: rgba(249,115,22,0.15);
    border: 1px solid rgba(249,115,22,0.3);
    color: var(--accent);
    border-radius: 99px;
    padding: 3px 12px;
    font-size: 13px;
    font-weight: 800;
  }

  /* ===== PROGRESS BAR ===== */
  .progress-wrap { margin-bottom: 24px; }
  .progress-info { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); margin-bottom: 8px; }
  .progress-bar { height: 6px; background: #21262d; border-radius: 99px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }

  /* ===== MODE TABS ===== */
  .mode-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    background: var(--card);
    padding: 6px;
    border-radius: 14px;
    border: 1px solid #21262d;
  }
  .tab-btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 12px rgba(249,115,22,0.4);
  }

  /* ===== SLIDE MODE ===== */
  .slide-card {
    background: var(--card);
    border: 1px solid #21262d;
    border-radius: 24px;
    padding: 40px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
    min-height: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    animation: slideIn 0.35s cubic-bezier(.4,0,.2,1);
  }
  @keyframes slideIn { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
  .slide-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
  }
  .slide-number { position: absolute; top: 20px; right: 24px; font-size: 12px; color: var(--muted); font-weight: 700; letter-spacing: 1px; }
  .slide-section-badge {
    display: inline-block;
    padding: 4px 14px;
    background: rgba(249,115,22,0.15);
    border: 1px solid rgba(249,115,22,0.3);
    border-radius: 99px;
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .slide-emoji {
    font-size: 72px;
    margin-bottom: 20px;
    display: block;
    filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4));
    animation: popIn 0.4s cubic-bezier(.175,.885,.32,1.275);
  }
  @keyframes popIn { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
  .slide-orya {
    font-family: 'Baloo 2', sans-serif;
    font-size: 52px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    margin-bottom: 12px;
  }
  .slide-indo { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .slide-hint { font-size: 13px; color: var(--muted); font-style: italic; }

  /* ===== AUDIO BUTTON ===== */
  .audio-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 16px;
    padding: 10px 20px;
    background: rgba(56,189,248,0.12);
    border: 1px solid rgba(56,189,248,0.3);
    border-radius: 99px;
    color: var(--accent2);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .audio-btn:hover { background: rgba(56,189,248,0.22); transform: scale(1.05); }
  .audio-btn.speaking { background: rgba(56,189,248,0.3); border-color: var(--accent2); }
  .audio-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* ===== SLIDE CONTROLS ===== */
  .slide-controls {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    align-items: center;
    justify-content: center;
  }
  .ctrl-btn {
    padding: 14px 28px;
    border: none;
    border-radius: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ctrl-btn:active { transform: scale(0.96); }
  .ctrl-btn.prev { background: #21262d; color: var(--text); }
  .ctrl-btn.next {
    background: linear-gradient(135deg, var(--accent), #ea580c);
    color: #fff;
    box-shadow: 0 4px 16px rgba(249,115,22,0.4);
    padding: 14px 36px;
  }
  .ctrl-btn:hover { filter: brightness(1.15); }
  .ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }

  /* ===== FLIP MODE ===== */
  .flip-scene {
    width: 100%; height: 340px;
    perspective: 1000px;
    margin-bottom: 24px;
    cursor: pointer;
  }
  .flip-card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(.4,0,.2,1);
  }
  .flip-card-inner.flipped { transform: rotateY(180deg); }
  .flip-front, .flip-back {
    position: absolute;
    width: 100%; height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: var(--card);
    border: 1px solid #21262d;
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    overflow: hidden;
  }
  .flip-front::before, .flip-back::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
  }
  .flip-back { transform: rotateY(180deg); }
  .flip-tap-hint { color: var(--muted); font-size: 12px; margin-top: 16px; }
  .flip-controls { display: flex; gap: 12px; justify-content: center; }

  /* ===== QUIZ MODE ===== */
  .score-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
    padding: 12px 16px;
    background: var(--card);
    border: 1px solid #21262d;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 700;
  }
  .score-item { display: flex; align-items: center; gap: 6px; }
  .score-dot { width: 8px; height: 8px; border-radius: 50%; }
  .score-dot.c { background: var(--correct); }
  .score-dot.w { background: var(--wrong); }
  .quiz-card {
    background: var(--card);
    border: 1px solid #21262d;
    border-radius: 24px;
    padding: 36px 28px;
    animation: slideIn 0.3s ease;
  }
  .quiz-question { text-align: center; margin-bottom: 28px; }
  .quiz-q-label { font-size: 13px; color: var(--muted); font-weight: 700; letter-spacing: 0.5px; margin-bottom: 12px; }
  .quiz-q-word {
    font-family: 'Baloo 2', sans-serif;
    font-size: 36px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 6px;
  }
  .quiz-q-sub { font-size: 13px; color: var(--muted); }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .quiz-opt {
    padding: 16px 12px;
    background: #21262d;
    border: 2px solid transparent;
    border-radius: 14px;
    color: var(--text);
    font-family: 'Baloo 2', sans-serif;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .quiz-opt:hover:not(:disabled) { border-color: var(--accent); background: rgba(249,115,22,0.1); }
  .quiz-opt.correct { background: rgba(34,197,94,0.15); border-color: var(--correct); color: var(--correct); }
  .quiz-opt.wrong { background: rgba(239,68,68,0.15); border-color: var(--wrong); color: var(--wrong); }
  .quiz-opt:disabled { cursor: not-allowed; }
  .quiz-feedback {
    text-align: center;
    margin-top: 16px;
    font-size: 15px;
    font-weight: 700;
    height: 24px;
  }
  .quiz-feedback.correct { color: var(--correct); }
  .quiz-feedback.wrong { color: var(--wrong); }
  .quiz-next {
    display: none;
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), #ea580c);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(249,115,22,0.3);
    transition: all 0.2s;
  }
  .quiz-next:hover { filter: brightness(1.1); }

  /* ===== RESULT SCREEN ===== */
  .result-screen {
    background: var(--card);
    border: 1px solid #21262d;
    border-radius: 24px;
    padding: 48px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.4s ease;
  }
  .result-screen::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
  }
  .result-emoji { font-size: 72px; display: block; margin-bottom: 16px; animation: popIn 0.5s cubic-bezier(.175,.885,.32,1.275); }
  .result-score {
    font-family: 'Baloo 2', sans-serif;
    font-size: 64px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 8px;
  }
  .result-label { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .result-player { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
  .result-new-best {
    display: inline-block;
    padding: 6px 16px;
    background: rgba(34,197,94,0.15);
    border: 1px solid rgba(34,197,94,0.4);
    border-radius: 99px;
    color: var(--correct);
    font-size: 13px;
    font-weight: 800;
    margin-bottom: 20px;
    animation: popIn 0.4s 0.3s both;
  }
  .result-btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .restart-btn {
    padding: 14px 28px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), #ea580c);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(249,115,22,0.4);
    transition: all 0.2s;
  }
  .restart-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
  .lb-btn {
    padding: 14px 28px;
    border: 1px solid #21262d;
    border-radius: 14px;
    background: var(--card);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
  }
  .lb-btn:hover { border-color: var(--accent2); color: var(--accent2); }
</style>
</head>
<body>

<!-- NAME SCREEN -->
<div id="name-screen">
  <div class="name-card">
    <span class="name-logo">🦜</span>
    <div class="name-title">Belajar Bahasa Orya</div>
    <p class="name-sub">Kosakata Bagian Tubuh — Papua, Indonesia</p>
    <div class="name-label">NAMA KAMU</div>
    <input class="name-input" id="name-input" type="text" placeholder="Ketik namamu..." maxlength="20" />
    <button class="name-start-btn" onclick="startGame()">Mulai Belajar →</button>
  </div>
</div>

<!-- MAIN APP -->
<div class="app" id="main-app" style="display:none">
  <div class="header">
    <span class="flag">🦜</span>
    <h1>Belajar Bahasa Orya</h1>
    <p>Kosakata Bagian Tubuh — Papua, Indonesia</p>
  </div>

  <!-- Player badge -->
  <div id="player-badge-wrap" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div class="player-badge" id="player-badge"></div>
    <button onclick="toggleLeaderboard()" style="background:none;border:1px solid #21262d;border-radius:10px;padding:8px 14px;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s" id="lb-toggle-btn">🏆 Papan Skor</button>
  </div>

  <!-- Leaderboard -->
  <div class="leaderboard-wrap" id="leaderboard-panel"></div>

  <!-- Mode tabs -->
  <div class="mode-tabs">
    <button class="tab-btn active" onclick="setMode('slide')">📖 Slide</button>
    <button class="tab-btn" onclick="setMode('flip')">🃏 Kartu</button>
    <button class="tab-btn" onclick="setMode('quiz')">✏️ Kuis</button>
  </div>

  <div id="app-content"></div>
</div>

<script>

  { section: "Jaringan & Umum", indo: "rambut badan", orya: "tim ala", emoji: "🧖" },
  { section: "Jaringan & Umum", indo: "kulit", orya: "sop", emoji: "🫂" },
  { section: "Jaringan & Umum", indo: "darah", orya: "kal", emoji: "🩸" },
  { section: "Jaringan & Umum", indo: "tulang", orya: "dan", emoji: "🦴" },
  { section: "Jaringan & Umum", indo: "daging", orya: "sop / nin", emoji: "🥩" },
  { section: "Jaringan & Umum", indo: "tubuh", orya: "tim", emoji: "🧍" },
];

let mode = 'slide';
let slideIdx = 0;
let flipIdx = 0;
let flipped = false;
let quizIdx = 0;
let quizScore = 0;
let quizWrong = 0;
let answered = false;
let quizOrder = [];
let playerName = '';
let leaderboardVisible = false;

// ===== LEADERBOARD =====
function getLeaderboard() {
  try {
    return JSON.parse(localStorage.getItem('orya_lb') || '[]');
  } catch(e) { return []; }
}

function saveScore(name, score, total) {
  let lb = getLeaderboard();
  const pct = Math.round((score / total) * 100);
  const existing = lb.find(e => e.name === name);
  if (!existing) {
    lb.push({ name, score, total, pct });
  } else if (pct > existing.pct) {
    existing.score = score;
    existing.total = total;
    existing.pct = pct;
    return true; // new best
  } else {
    return false;
  }
  lb.sort((a,b) => b.pct - a.pct);
  lb = lb.slice(0, 10);
  try { localStorage.setItem('orya_lb', JSON.stringify(lb)); } catch(e) {}
  return existing ? false : true;
}

function getBest(name) {
  const lb = getLeaderboard();
  const entry = lb.find(e => e.name === name);
  return entry ? entry.pct : null;
}

function renderLeaderboard() {
  const lb = getLeaderboard();
  const panel = document.getElementById('leaderboard-panel');
  if (!lb.length) {
    panel.innerHTML = '<div class="lb-title">🏆 PAPAN SKOR</div><div style="color:var(--muted);font-size:14px;text-align:center;padding:8px 0">Belum ada skor. Mainkan kuisnya dulu!</div>';
    return;
  }
  const medals = ['🥇','🥈','🥉'];
  const rows = lb.map((e,i) => `
    <div class="lb-row">
      <span class="lb-rank">${medals[i] || (i+1)}</span>
      <span class="lb-player-name">${escHtml(e.name)}</span>
      <span class="lb-score-pill">${e.score}/${e.total} · ${e.pct}%</span>
    </div>
  `).join('');
  panel.innerHTML = `<div class="lb-title">🏆 PAPAN SKOR TERBAIK</div>${rows}`;
}

function toggleLeaderboard() {
  leaderboardVisible = !leaderboardVisible;
  const panel = document.getElementById('leaderboard-panel');
  panel.classList.toggle('show', leaderboardVisible);
  document.getElementById('lb-toggle-btn').style.color = leaderboardVisible ? 'var(--accent2)' : '';
  if (leaderboardVisible) renderLeaderboard();
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== NAME SCREEN =====
function startGame() {
  const val = document.getElementById('name-input').value.trim();
  playerName = val || 'Pemain';
  document.getElementById('name-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  updatePlayerBadge();
  quizOrder = shuffle([...Array(data.length).keys()]);
  render();
}

document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') startGame();
});

function updatePlayerBadge() {
  const badge = document.getElementById('player-badge');
  const best = getBest(playerName);
  const initial = playerName.charAt(0).toUpperCase();
  badge.innerHTML = `
    <div class="player-avatar">${initial}</div>
    <div>
      <div class="player-name-text">${escHtml(playerName)}</div>
      <div class="player-best">${best !== null ? `🏆 Terbaik: ${best}%` : 'Belum ada skor'}</div>
    </div>
  `;
}

// ===== AUDIO =====
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'id-ID';
  utt.rate = 0.85;
  utt.pitch = 1;
  window.speechSynthesis.speak(utt);
}

function audioBtn(text, id) {
  return `<button class="audio-btn" id="${id}" onclick="handleAudio('${text.replace(/'/g,"\\'")}','${id}')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
    </svg>
    Dengarkan
  </button>`;
}

function handleAudio(text, id) {
  const btn = document.getElementById(id);
  if (btn) btn.classList.add('speaking');
  speak(text);
  setTimeout(() => { if (btn) btn.classList.remove('speaking'); }, 1500);
}

// ===== MODE =====
function setMode(m) {
  mode = m;
  slideIdx = 0; flipIdx = 0; flipped = false;
  quizIdx = 0; quizScore = 0; quizWrong = 0; answered = false;
  quizOrder = shuffle([...Array(data.length).keys()]);
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['slide','flip','quiz'][i] === m);
  });
  render();
}

function shuffle(arr) {
  for (let i = arr.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function render() {
  const el = document.getElementById('app-content');
  if (mode === 'slide') el.innerHTML = renderSlide();
  if (mode === 'flip') el.innerHTML = renderFlip();
  if (mode === 'quiz') el.innerHTML = renderQuiz();
}

// ===== SLIDE =====
function renderSlide() {
  const item = data[slideIdx];
  const pct = Math.round(((slideIdx+1)/data.length)*100);
  return `
    <div class="progress-wrap">
      <div class="progress-info">
        <span>📍 ${item.section}</span>
        <span>${slideIdx+1} / ${data.length}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="slide-card">
      <span class="slide-number">${slideIdx+1}/${data.length}</span>
      <div class="slide-section-badge">${item.section}</div>
      <span class="slide-emoji">${item.emoji}</span>
      <div class="slide-orya">${item.orya}</div>
      <div class="slide-indo">${item.indo}</div>
      <div class="slide-hint">Bahasa Indonesia → Bahasa Orya</div>
      ${audioBtn(item.orya, 'slide-audio')}
    </div>
    <div class="slide-controls">
      <button class="ctrl-btn prev" onclick="slideNav(-1)" ${slideIdx===0?'disabled':''}>← Kembali</button>
      <button class="ctrl-btn next" onclick="slideNav(1)">${slideIdx===data.length-1?'🏁 Selesai':'Lanjut →'}</button>
    </div>
  `;
}

function slideNav(dir) {
  slideIdx = Math.max(0, Math.min(data.length-1, slideIdx+dir));
  render();
}

// ===== FLIP =====
function renderFlip() {
  const item = data[flipIdx];
  const pct = Math.round(((flipIdx+1)/data.length)*100);
  return `
    <div class="progress-wrap">
      <div class="progress-info">
        <span>🃏 Kartu ${flipIdx+1} dari ${data.length}</span>
        <span>${item.section}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="flip-scene">
      <div class="flip-card-inner ${flipped?'flipped':''}" id="flipcard" onclick="doFlip()">
        <div class="flip-front">
          <span style="font-size:64px">${item.emoji}</span>
          <div style="font-size:26px;font-weight:800;margin-top:16px">${item.indo}</div>
          <div class="flip-tap-hint">👆 Ketuk untuk lihat jawaban</div>
        </div>
        <div class="flip-back">
          <span style="font-size:64px">${item.emoji}</span>
          <div style="font-family:'Baloo 2',sans-serif;font-size:48px;font-weight:800;background:linear-gradient(135deg,#f97316,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-top:12px">${item.orya}</div>
          <div style="color:#8b949e;font-size:14px;margin-top:8px">${item.indo}</div>
          ${audioBtn(item.orya, 'flip-audio')}
        </div>
      </div>
    </div>
    <div class="flip-controls">
      <button class="ctrl-btn prev" onclick="flipNav(-1)" ${flipIdx===0?'disabled':''}>← Kembali</button>
      <button class="ctrl-btn next" onclick="flipNav(1)">${flipIdx===data.length-1?'🏁 Selesai':'Lanjut →'}</button>
    </div>
  `;
}

function doFlip() { flipped = !flipped; document.getElementById('flipcard').classList.toggle('flipped', flipped); }
function flipNav(dir) { flipIdx = Math.max(0, Math.min(data.length-1, flipIdx+dir)); flipped = false; render(); }

// ===== QUIZ =====
function renderQuiz() {
  if (quizIdx >= data.length) return renderResult();
  const realIdx = quizOrder[quizIdx];
  const item = data[realIdx];
  const pct = Math.round((quizIdx/data.length)*100);

  let opts = [item.orya];
  let pool = data.filter((_,i)=>i!==realIdx).map(d=>d.orya);
  pool = shuffle(pool);
  opts = opts.concat(pool.slice(0,3));
  opts = shuffle(opts);

  const optsHTML = opts.map((o,i) => `
    <button class="quiz-opt" id="opt${i}" onclick="checkAnswer(this,'${o.replace(/'/g,"\\'")}','${item.orya.replace(/'/g,"\\'")}')">${o}</button>
  `).join('');

  return `
    <div class="score-bar">
      <div class="score-item"><div class="score-dot c"></div><span>Benar: ${quizScore}</span></div>
      <div class="score-item"><div class="score-dot w"></div><span>Salah: ${quizWrong}</span></div>
      <div style="margin-left:auto;color:var(--muted);font-size:13px">${quizIdx+1}/${data.length}</div>
    </div>
    <div class="progress-wrap" style="margin-bottom:16px">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="quiz-card">
      <div class="quiz-question">
        <div class="quiz-q-label">Apa artinya dalam Bahasa Orya?</div>
        <div class="quiz-q-word">${item.emoji} ${item.indo}</div>
        <div class="quiz-q-sub">${item.section}</div>
      </div>
      <div class="quiz-options">${optsHTML}</div>
      <div class="quiz-feedback" id="qfeed"></div>
      <button class="quiz-next" id="qnext" onclick="nextQuiz()">Soal Berikutnya →</button>
    </div>
  `;
}

function checkAnswer(btn, chosen, correct) {
  if (answered) return;
  answered = true;
  const allBtns = document.querySelectorAll('.quiz-opt');
  allBtns.forEach(b => b.disabled = true);
  const feed = document.getElementById('qfeed');
  if (chosen === correct) {
    btn.classList.add('correct');
    feed.textContent = '✅ Benar! Bagus sekali!';
    feed.className = 'quiz-feedback correct';
    quizScore++;
    speak(correct);
  } else {
    btn.classList.add('wrong');
    feed.textContent = `❌ Salah. Jawaban: ${correct}`;
    feed.className = 'quiz-feedback wrong';
    allBtns.forEach(b => { if (b.textContent.trim() === correct) b.classList.add('correct'); });
    quizWrong++;
    setTimeout(() => speak(correct), 600);
  }
  document.getElementById('qnext').style.display = 'block';
}

function nextQuiz() { quizIdx++; answered = false; render(); }

function renderResult() {
  const pct = Math.round((quizScore/data.length)*100);
  let emoji = pct >= 80 ? '🏆' : pct >= 50 ? '👍' : '📚';
  let msg = pct >= 80 ? 'Luar biasa!' : pct >= 50 ? 'Bagus, terus belajar!' : 'Yuk coba lagi!';

  // Save score
  const prevBest = getBest(playerName);
  const isNew = saveScore(playerName, quizScore, data.length);
  updatePlayerBadge();

  const newBestHTML = (isNew || (prevBest !== null && pct > prevBest))
    ? '<div class="result-new-best">⭐ Rekor baru kamu!</div>'
    : '';

  return `
    <div class="result-screen">
      <span class="result-emoji">${emoji}</span>
      <div class="result-score">${quizScore}/${data.length}</div>
      <div class="result-label">${pct}% benar — ${msg}</div>
      <div class="result-player">👤 ${escHtml(playerName)}</div>
      ${newBestHTML}
      <div class="result-btn-row">
        <button class="restart-btn" onclick="restartQuiz()">🔄 Ulangi Kuis</button>
        <button class="lb-btn" onclick="showLeaderboardFromResult()">🏆 Papan Skor</button>
      </div>
    </div>
  `;
}

function showLeaderboardFromResult() {
  leaderboardVisible = true;
  const panel = document.getElementById('leaderboard-panel');
  panel.classList.add('show');
  renderLeaderboard();
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function restartQuiz() {
  quizIdx = 0; quizScore = 0; quizWrong = 0; answered = false;
  quizOrder = shuffle([...Array(data.length).keys()]);
  render();
}
</script>
</body>
</html>
